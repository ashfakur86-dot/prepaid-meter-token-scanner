name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        elif [ -f "app/gradlew" ]; then
          chmod +x app/gradlew
        fi

    - name: Build with Gradle
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleRelease
        elif [ -f "app/gradlew" ]; then
          cd app
          ./gradlew assembleRelease
        else
          echo "Gradlew not found, attempting direct build"
          cd app && gradlew assembleRelease || gradle assembleRelease
        fi

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Prepaid-Token-App
        path: "**/build/outputs/apk/release/*.apk"
