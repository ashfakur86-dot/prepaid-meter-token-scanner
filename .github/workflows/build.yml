name: Ultimate Flutter APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Fix Android MinSdkVersion
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' app/android/app/build.gradle || sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

    - name: Get Dependencies
      run: |
        if [ -d "app" ]; then cd app; fi
        flutter pub get

    - name: Build APK Release
      run: |
        if [ -d "app" ]; then cd app; fi
        flutter build apk --release

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Prepaid-Token-App
        path: "**/build/app/outputs/apk/release/app-release.apk"
